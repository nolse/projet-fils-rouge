---
# ============================================================
# Rôle pgadmin_role — Déploiement pgAdmin4 via Docker
# pgAdmin est déployé sur le serveur "webapp" (port 5050)
# Il se connecte à la DB PostgreSQL du serveur "odoo"
# ============================================================

# --- 1. Prérequis système ---
- name: Installer les dépendances système
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - python3-pip
    state: present
    update_cache: true

- name: Installer le module Python docker (requis par Ansible pour piloter Docker)
  ansible.builtin.pip:
    name: docker
    state: present

# --- 2. Installation Docker ---
- name: Ajouter la clé GPG Docker
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Ajouter le dépôt officiel Docker
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable"
    state: present

- name: Installer Docker Engine + Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Démarrer et activer Docker au boot
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

# --- 3. Déploiement pgAdmin ---
- name: Créer le répertoire de déploiement pgAdmin
  ansible.builtin.file:
    path: "{{ pgadmin_deploy_dir }}"
    state: directory
    mode: "0755"

- name: Déployer le docker-compose pgAdmin (depuis template Jinja2)
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ pgadmin_deploy_dir }}/docker-compose.yml"
    mode: "0644"
  notify: restart pgadmin

- name: Déployer servers.json (préconfiguration connexion BDD Odoo)
  # Ce fichier permet à pgAdmin de connaître l'adresse du serveur PostgreSQL
  # dès le premier démarrage, sans configuration manuelle
  ansible.builtin.template:
    src: servers.json.j2
    dest: "{{ pgadmin_deploy_dir }}/servers.json"
    mode: "0644"
  notify: restart pgadmin

- name: Lancer pgAdmin via Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ pgadmin_deploy_dir }}"
    state: present
    pull: always
